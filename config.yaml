games:
  arc_raiders:
    display_name: "Arc Raiders"
    twitch_url: "https://www.twitch.tv/directory/game/Arc%20Raiders/clips"
    folder: "arc_raiders"
  marvel_rivals:
    display_name: "Marvel Rivals"
    twitch_url: "https://www.twitch.tv/directory/game/Marvel%20Rivals/clips"
    folder: "marvel_rivals"
  deadlock:
    display_name: "Deadlock"
    twitch_url: "https://www.twitch.tv/directory/game/Deadlock/clips"
    folder: "deadlock"

paths:
  inbox: "inbox"
  quarantine: "quarantine"
  processing: "processing"
  accepted: "accepted"
  rejected: "rejected"
  templates: "templates"
  assets: "assets"
  logs: "logs"

ingestion:
  max_clips_per_run: 20
  max_clip_age_hours: 72    # skip clips older than this; set null to disable
  quality_thresholds:
    min_duration_seconds: 8
    max_duration_seconds: 600
    min_resolution_height: 480

transcription:
  model: "medium"      # options: tiny | base | small | medium | large-v3
  language: "en"       # hint passed to Whisper during transcription
  language_filter: "en"  # skip clips where Whisper detects a different language; set null to disable

scoring:
  model: "claude-haiku-4-5-20251001"  # haiku: fast + cheap; swap to claude-sonnet-4-6 for higher quality
  max_tokens: 512

distribution:
  platforms:
    youtube_shorts:
      enabled: false        # set true + configure YOUTUBE_CLIENT_ID/SECRET in .env
      privacy: "public"
      category_id: "20"    # 20 = Gaming
    tiktok:
      enabled: false        # set true + configure TIKTOK_ACCESS_TOKEN in .env
      privacy_level: "SELF_ONLY"   # use SELF_ONLY for testing, PUBLIC_TO_EVERYONE for live
    instagram_reels:
      enabled: false        # requires public video hosting step — see distribution.py
    twitter_x:
      enabled: false        # set true + configure TWITTER_* vars in .env
    reddit:
      enabled: false        # set true + configure REDDIT_* vars in .env
      subreddits:
        arc_raiders: "ArcRaiders"
        marvel_rivals: "MarvelRivals"
        deadlock: "DeadlockTheGame"
      # Optional flair per subreddit — run: python run.py --list-reddit-flairs
      # to discover available flair IDs, then add them here.
      subreddit_config:
        arc_raiders:
          flair_id: null    # e.g. "abc123-..."
        marvel_rivals:
          flair_id: null
        deadlock:
          flair_id: null

default_template_id: "fast_hype"  # all clips use this template; change here to switch

# ---------------------------------------------------------------------------
# Audio copyright handling
# ---------------------------------------------------------------------------
# mode options:
#   "original"  — keep the clip's audio as-is (default; copyright risk on Twitch clips)
#   "mute"      — strip all audio (safe; silent video)
#   "replace"   — replace audio with a royalty-free track from replacement_track path
#
# Copyright detection (optional — requires ACRCloud account):
#   Set ACRCLOUD_ACCESS_KEY and ACRCLOUD_ACCESS_SECRET in .env, then set
#   detection.enabled: true. When a fingerprint match is found above
#   confidence_threshold, the mode above is applied automatically.
#   Without detection enabled, mode is applied to ALL clips unconditionally.
#
# ACRCloud free tier: 100 recognitions/day — sufficient for a personal pipeline.
# Sign up at: https://www.acrcloud.com
audio:
  mode: "original"            # original | mute | replace
  replacement_track: null     # e.g. "assets/music/royalty_free_hype.mp3"
  detection:
    enabled: false            # set true + add ACRCLOUD_* env vars to activate
    provider: "acrcloud"
    confidence_threshold: 80  # 0–100; treat as copyrighted if score >= this

# ---------------------------------------------------------------------------
# Analytics — Google Sheets logging
# ---------------------------------------------------------------------------
# Required env vars (set in .env):
#   GOOGLE_SERVICE_ACCOUNT_JSON  — /path/to/your-service-account-key.json
#   GOOGLE_SHEETS_ID             — the ID from the spreadsheet URL:
#                                  docs.google.com/spreadsheets/d/<ID>/edit
#
# Setup: create a Service Account in Google Cloud Console, download its JSON
# key, share your spreadsheet with the service account email as Editor.
# The "Analytics" tab and header row are created automatically on first run.
analytics:
  enabled: true   # set false to disable without removing env vars

# ---------------------------------------------------------------------------
# Backup — Google Drive
# ---------------------------------------------------------------------------
# Required env vars (set in .env):
#   GOOGLE_SERVICE_ACCOUNT_JSON    — same key file as analytics
#   GOOGLE_DRIVE_BACKUP_FOLDER_ID  — folder ID from the Drive URL:
#                                    drive.google.com/drive/folders/<ID>
#
# Setup: create a folder in Drive, share it with the service account email
# as Editor, copy the folder ID from the URL.
# Uploads the .mp4 and .meta.json for each approved clip. Idempotent.
backup:
  enabled: true   # set false to disable without removing env vars

# ---------------------------------------------------------------------------
# Game Scouting Dashboard
# ---------------------------------------------------------------------------
# Tracks emerging FPS games via Twitch, YouTube, and Google Trends.
# Results are displayed at http://127.0.0.1:5000/scout and logged to the
# "Scout" tab in the existing Google Sheets spreadsheet.
#
# Required env vars:
#   TWITCH_CLIENT_ID / TWITCH_CLIENT_SECRET  — already used for ingestion
#   YOUTUBE_API_KEY                           — read-only API key from Google Cloud
#                                              Console (separate from OAuth upload key)
#                                              Enable: YouTube Data API v3, restrict to key
#   GOOGLE_SERVICE_ACCOUNT_JSON / GOOGLE_SHEETS_ID — already used for analytics
#
# pytrends (Google Trends) requires no API key but is rate-limited.
# A 6-hour poll interval on ≤20 games is safe.
scout:
  enabled: true
  poll_interval_hours: 6
  thresholds:
    trend_score_min: 6      # flag when trend_score >= this ...
    longevity_score_min: 5  # ... AND longevity_score >= this
  # Seed game list — loaded into scout_cache.json on first run.
  # After first run, add/remove games via the Scout dashboard UI.
  games:
    - name: "Arc Raiders"
      longevity_score: 7
    - name: "Deadlock"
      longevity_score: 8
    - name: "Marvel Rivals"
      longevity_score: 7

# ---------------------------------------------------------------------------
# Rank Looker — pre-download skill filter
# ---------------------------------------------------------------------------
# Runs on Twitch clip metadata (title, broadcaster follower count) BEFORE
# downloading anything. Skips clips that show no skill signals.
#
# mode: "heuristic" — title NLP + follower count proxy; no extra API key needed
# mode: "api"       — Tracker.gg rank lookup (future; requires TRACKER_GG_API_KEY)
#
# Heuristic logic (in order):
#   1. Smurf keyword in title          → reject (overrides follower count)
#   2. Follower count >= threshold     → accept (Verified Skill proxy)
#   3. Sweat keyword in title          → accept
#   4. No skill signals, strict: false → accept (permissive default)
#   4. No skill signals, strict: true  → reject
#
# Mid-tier rank thresholds per game (used when mode: "api" is implemented):
#   marvel_rivals: platinum and above  (gold < platinum < diamond < grandmaster ...)
#   deadlock:      emissary and above  (ritualist < emissary < archon < oracle ...)
#   arc_raiders:   no ranked mode yet; heuristic only
rank_looker:
  enabled: false          # set true to activate
  mode: "heuristic"       # "heuristic" | "api"
  tracker_gg_api_key: null  # set or use TRACKER_GG_API_KEY env var for api mode
  strict: false           # true = reject clips with no skill signals
  min_follower_count: 50000
  game_rank_thresholds:
    marvel_rivals: "platinum"
    deadlock: "emissary"
    arc_raiders: null
  sweat_keywords:
    - "scrim"
    - "tourney"
    - "tournament"
    - "top 100"
    - "pro"
    - "ranked"
    - "elo"
    - "mmr"
    - "competitive"
  smurf_keywords:
    - "smurf"
    - "bronze to gm"
    - "low elo"
    - "stomping"
    - "easy lobby"

# ---------------------------------------------------------------------------
# Kill-Feed Parser — post-download skill gate (OpenCV)
# ---------------------------------------------------------------------------
# Analyses the kill-feed ROI of each downloaded clip before transcription or
# AI scoring. Clips with a peak 5-second sweat score >= sweat_threshold are
# promoted; others still proceed but carry a lower kill_feed score so you can
# filter in the review UI.
#
# ROI calibration (run once per game / after HUD patches):
#   1. Extract frame 0: python -c "import cv2,sys; cap=cv2.VideoCapture(sys.argv[1]);
#          ok,f=cap.read(); cv2.imwrite('frame0.png',f)" inbox/<game>/<clip>.mp4
#   2. Open frame0.png, note the pixel rectangle around the kill feed.
#   3. Scale to 1920×1080:  x_norm = x_raw * 1920 // frame_width  (same for y/w/h)
#   4. Update roi below.
#
# Color tuning (HSV — Hue 0-180, Sat 0-255, Val 0-255):
#   Use the script tools/tune_colors.py (coming soon) or adjust manually.
#   Kill feed text is usually near-white (low Sat, high Val).
#   Headshot highlights are game-specific (orange/yellow for most titles).
#
# Template icons:
#   Place PNG/JPG files under assets/kill_feed_templates/<game>/
#     kill_<name>.png      — skull, elimination icon, etc.
#     headshot_<name>.png  — headshot badge/icon
#   If no files exist, template matching is skipped; color + MOG2 handle detection.
kill_feed:
  enabled: false              # set true to activate
  sweat_threshold: 50         # peak 5-second window score needed to pass
  window_seconds: 5
  sample_fps: 5
  kill_score: 10              # points per kill event
  headshot_score: 20          # points per headshot event
  color_spike_factor: 5.0     # current pixels must be > 5× rolling baseline to trigger
  min_pixel_mass: 50          # ignore color hits with fewer pixels than this
  template_dir: "assets/kill_feed_templates"
  games:
    marvel_rivals:
      # Kill feed: top-right corner. ROI is approximate — calibrate with a screenshot.
      roi:
        x: 1620
        y: 10
        w: 300
        h: 380
      kill_colors:
        - lower: [0, 0, 180]       # HSV near-white (player name text)
          upper: [180, 50, 255]
      headshot_colors:
        - lower: [15, 120, 200]    # HSV orange-yellow (headshot highlight)
          upper: [40, 255, 255]
      pixel_spike_threshold: 50
    deadlock:
      roi:
        x: 1620
        y: 15
        w: 300
        h: 350
      kill_colors:
        - lower: [0, 0, 175]       # HSV near-white
          upper: [180, 55, 255]
      headshot_colors:
        - lower: [15, 100, 190]    # HSV gold/orange (soul-orb color palette)
          upper: [45, 255, 255]
      pixel_spike_threshold: 50
    arc_raiders:
      roi:
        x: 1600
        y: 20
        w: 320
        h: 400
      kill_colors:
        - lower: [0, 0, 175]       # HSV near-white
          upper: [180, 55, 255]
      headshot_colors:
        - lower: [10, 100, 200]    # HSV orange-red (elimination highlight)
          upper: [30, 255, 255]
      pixel_spike_threshold: 50

pipeline:
  watch_interval_seconds: 30

review:
  host: "127.0.0.1"
  port: 5000
  debug: false
