# ---------------------------------------------------------------------------
# Title Engine — context-aware upload title generation
# ---------------------------------------------------------------------------
# Selects a title template from assets/titles.yaml based on kill-feed and
# weapon-detection results. Substitutes {weapon}, {kill_count}, etc.
# Tracks recently used templates per game to avoid back-to-back repeats.
#
# Category selection (in order):
#   headshots + kills >= 3  → aggressive
#   kills >= 2              → aggressive
#   kills == 1 + headshot   → aggressive
#   sweat_score > 50        → aggressive
#   fallback                → engagement_bait / educational (alternating)
#
# mode: "template"  — pure template substitution (default)
# mode: "llm"       — future: feeds structured CV data to Claude for variety
title_engine:
  enabled: false
  mode: "template"
  titles_path: "assets/titles.yaml"
  history_path: "assets/title_history.json"
  history_window: 20

pipeline:
  watch_interval_seconds: 30

review:
  host: "127.0.0.1"
  port: 5000
  debug: false

# ---------------------------------------------------------------------------
# Montage Assembler
# ---------------------------------------------------------------------------
# Selects accepted clips by kill_feed.sweat_score (highest first), trims each
# to its peak action window, and concatenates them until target_duration_seconds
# is reached.
#
# Usage:  python run.py --montage arc_raiders
#         python run.py --montage all
#
# require_kill_feed: true  — skip clips with no kill_feed data (default)
# require_kill_feed: false — include them trimmed to the clip midpoint instead
montage:
  enabled: false
  target_duration_seconds: 45
  transition: "flash"            # "cut" | "flash"
  flash_color: "white"           # "white" | "black"
  flash_duration_seconds: 0.067  # ~2 frames at 30 fps
  clip_window_seconds: 5         # action window per clip
  clip_padding_seconds: 2        # context before/after window
  min_sweat_score: 0             # minimum kill_feed.sweat_score to include
  require_kill_feed: true        # skip clips without kill_feed data
  output_dir: "montage"
  max_clips: 10                  # safety cap
