<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clip Review{% endblock %} — ClipBot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --text:      #e8e8e8;
      --muted:     #888;
      --accent:    #7c6bff;
      --green:     #22c55e;
      --red:       #ef4444;
      --gold:      #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header .logo {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    header nav a {
      color: var(--muted);
      font-size: 13px;
    }
    header nav a:hover { color: var(--text); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .badge-high   { background: #14532d; color: #4ade80; }
    .badge-medium { background: #78350f; color: #fbbf24; }
    .badge-low    { background: #1e1b4b; color: #a5b4fc; }
    .badge-other  { background: #1f1f1f; color: #9ca3af; }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }
    .score-high   { background: #14532d; color: #4ade80; }
    .score-medium { background: #78350f; color: #fbbf24; }
    .score-low    { background: #1e1b4b; color: #a5b4fc; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <span class="logo">⬡ ClipBot</span>
    <nav style="display:flex;gap:20px;">
      <a href="{{ url_for('queue') }}">Queue</a>
      <a href="{{ url_for('quarantine_queue') }}">Quarantine</a>
    </nav>
    {% block header_extra %}{% endblock %}
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
