events:
  - id: call_of_duty.a_big_game_bounty_contract_marks_a_player_with_a_high_elimination_count_to_be_eliminated_in_a_limited_time_the_contract_is_shown_on_the_tac_map_at_the_end_of_the_first_playzone_and_will_not_target_the_same_player_several_times_in_a_row
    display_name: A Big Game Bounty contract marks a player with a high elimination count to be eliminated in a limited time. The contract is shown on the Tac Map at the end of the first playzone and will not target the same player several times in a row.
    source_page_url: "https://callofduty.fandom.com/wiki/Call_of_Duty:_Warzone"
  - id: call_of_duty.a_bounty_contract_tasks_the_team_with_killing_a_specific_player_who_is_marked_by_a_yellow_circle_revealing_their_approximate_position_on_the_map_when_a_player_is_marked_as_a_bounty_target_they_and_their_team_can_see_a_bar_on_their_heads
    display_name: A Bounty contract tasks the team with killing a specific player, who is marked by a yellow circle revealing their approximate position on the map. When a player is marked as a bounty target, they and their team can see a bar on their heads
    source_page_url: "https://callofduty.fandom.com/wiki/Call_of_Duty:_Warzone"
  - id: call_of_duty.a_cctv_near_metro_exits_may_have_spotted_something
    display_name: A CCTV near metro exits may have spotted something...
    source_page_url: "https://callofduty.fandom.com/wiki/Call_of_Duty:_Warzone"
  - id: call_of_duty.a_contraband_contract_has_a_small_chance_of_occurring_after_completing_any_of_the_aforementioned_contracts_among_the_loot_the_team_is_rewarded_with_contraband_will_spawn_appearing_as_a_bright_blue_suitcase_it_must_be_picked_up_and_brought_to_a_highlighted_point_for_helicopter_extraction_within_a_time_limit_this_contract_rewards_the_team_with_an_unlock_for_one_of_many_unique_weapon_blueprints
    display_name: A Contraband contract has a small chance of occurring after completing any of the aforementioned contracts. Among the loot the team is rewarded with, Contraband will spawn, appearing as a bright blue suitcase. It must be picked up and brought to a highlighted point for helicopter extraction within a time limit. This contract rewards the team with an unlock for one of many unique weapon blueprints.
    source_page_url: "https://callofduty.fandom.com/wiki/Call_of_Duty:_Warzone"
