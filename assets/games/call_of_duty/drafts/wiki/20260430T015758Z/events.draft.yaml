  - id: call_of_duty.a_most_wanted_contract_marks_its_user_for_all_enemies_to_see_offering_a_reward_to_any_player_who_can_eliminate_them_in_a_limited_time_letting_the_time_run_out_completes_the_contract_rewarding_the_player_and_their_team_with_cash_as_well_as_redeploying_any_eliminated_teammates
    display_name: A Most Wanted contract marks its user for all enemies to see, offering a reward to any player who can eliminate them in a limited time. Letting the time run out completes the contract, rewarding the player and their team with Cash as well as redeploying any eliminated teammates.
    source_page_url: "https://callofduty.fandom.com/wiki/Call_of_Duty:_Warzone"
