# Clip title templates for the Title Engine.
#
# Every template MUST include {weapon} — this is substituted with the
# hero name (Deadlock, Marvel Rivals) or weapon name (Arc Raiders)
# detected by the Weapon Detector OpenCV stage.
#
# Variables available for substitution:
#   {weapon}       — hero or weapon display name (e.g. "Venom", "Kettle")
#   {kill_count}   — total kills from kill-feed parser
#   {enemy_count}  — same as kill_count; for "1v{enemy_count}" framing
#
# Templates with a missing variable have the placeholder silently removed.
#
# Four psychological hook categories (title_engine.py → _select_category):
#
#   meta_authority   — "pros are quietly doing this" / FOMO angle
#   broken_balance   — "this is unfair / needs a nerf" / controversy angle
#   reactionary_shock— "I wasn't expecting this" / curiosity angle
#   performance_hype — "popping off / peak gameplay" / action angle
#
# Category is selected based on kill-feed signals with randomisation between
# applicable categories so the same clip type doesn't always produce the
# same hook style. See title_engine.py → _select_category for the logic.

# ---------------------------------------------------------------------------
# Generic — fallback for any game not listed below
# ---------------------------------------------------------------------------
generic:
  meta_authority:
    - "The reason every pro has switched to {weapon}"
    - "Pros aren't telling you how broken {weapon} is"
    - "Stop ignoring {weapon} if you want to rank up"
    - "Is {weapon} actually the new meta?"
    - "Why the top 1% are abusing {weapon} right now"
    - "Why every pro is running {weapon} this patch"
    - "The {weapon} trick that's dominating high elo"
    - "Top players won't stop picking {weapon} — here's why"
    - "{weapon} is quietly becoming the best pick in the game"
    - "This is why {weapon} keeps showing up in every high-rank lobby"

  broken_balance:
    - "{weapon} is actually unfair in this patch"
    - "I can't believe they haven't nerfed {weapon} yet"
    - "Is it even a skill issue if they're using {weapon}?"
    - "POV: you finally realized {weapon} is a cheat code"
    - "{weapon} is completely out of control lately"
    - "They have to nerf {weapon} — this is unacceptable"
    - "{weapon} is so strong it should be illegal"
    - "The devs need to look at {weapon} immediately"
    - "How is {weapon} still in the game like this?"
    - "Playing against {weapon} is genuinely not fun"

  reactionary_shock:
    - "I wasn't expecting {weapon} to be this good"
    - "This is exactly why I main {weapon}"
    - "You're using {weapon} wrong — watch this"
    - "I switched to {weapon} and never looked back"
    - "Nobody talks about how good {weapon} actually is"
    - "Once you try {weapon} you can't go back"
    - "This changed how I think about {weapon} forever"
    - "{weapon} hits different when you actually know what you're doing"
    - "The {weapon} clip I didn't think was possible"
    - "{weapon} gameplay that actually feels illegal"

  performance_hype:
    - "Cleanest {weapon} clips you'll see today"
    - "{weapon} going absolutely crazy in high rank"
    - "Mastering {weapon} is the best feeling in the game"
    - "Nobody is playing {weapon} at this level"
    - "This {weapon} clip is peak performance"
    - "Popping off with {weapon}"
    - "The {weapon} play that broke their whole game"
    - "Pure {weapon} domination — no other word for it"
    - "{weapon} looking absolutely lethal right now"
    - "{kill_count} kills with {weapon} and it wasn't even close"

