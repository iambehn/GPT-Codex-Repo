# Clip title templates for the Title Engine.
#
# Variables available for substitution:
#   {weapon}         — detected weapon display name (e.g., "Sniper Rifle")
#   {game}           — game display name (e.g., "Marvel Rivals")
#   {kill_count}     — total kills detected by kill-feed parser
#   {headshot_count} — total headshots detected
#   {enemy_count}    — same as kill_count; used for "1v{enemy_count}" framing
#   {hero}           — character name (future: hero/character detection)
#   {map}            — map name (future: minimap detection)
#   {season}         — current season (future: config field)
#
# Templates missing a variable will have the placeholder silently removed.
# Add game-specific sections using config.yaml game keys.
# Generic templates are used as fallback when no game-specific ones exist.
#
# Category selection (title_engine.py → _select_category):
#   aggressive      → headshots + multi-kills, or high sweat score
#   educational     → low-action clips (alternates with engagement_bait)
#   engagement_bait → low-action clips (alternates with educational)

# ---------------------------------------------------------------------------
# Generic (applies to all games as fallback)
# ---------------------------------------------------------------------------
generic:
  aggressive:
    - "The {weapon} is BROKEN right now"
    - "Nobody survives this {weapon} combo"
    - "1v{enemy_count} and they never stood a chance"
    - "Why is the {weapon} this strong??"
    - "POV: you peaked too early"
    - "They did NOT see that coming"
    - "This is what {weapon} mastery looks like"
    - "The {weapon} just ended their whole career"
    - "Clean. Absolutely clean."
    - "{kill_count} kills and it wasn't even close"
    - "The {weapon} said no"
    - "Okay but that {weapon} shot was NOT supposed to hit"

  educational:
    - "Why every pro is running {weapon} right now"
    - "The {weapon} trick nobody talks about"
    - "How to actually use {weapon} properly"
    - "Stop sleeping on the {weapon}"
    - "The most underrated {weapon} play you'll see today"
    - "This is why {weapon} wins games"
    - "{weapon} mechanics that took me 100 hours to learn"

  engagement_bait:
    - "Is {weapon} getting nerfed soon?"
    - "I can't believe this {weapon} play worked"
    - "Okay but HOW did that {weapon} hit?"
    - "The {weapon} should NOT be this good"
    - "Wait... is {weapon} actually broken?"
    - "Comment if you've done this with {weapon}"
    - "The {weapon} makes no sense and I love it"
    - "Is this the best {weapon} clip this week?"

