# Marvel Rivals — hero roster
#
# Living reference: https://www.marvelrivals.com/heroes/
#
# Used by weapon_detector.py to map hero_id → display_name.
# {weapon} in title templates is substituted with the hero's display_name.
# Role (Vanguard / Duelist / Strategist) stored for future title flexibility.
# primary_weapon: the hero's normal-attack weapon name — fill in as wiki data
#   becomes available; used for future title variants like
#   "Black Widow's Red Room Rifle is cracked" vs "Black Widow is cracked".
#
# hero_id must match the filename in assets/weapon_icons/marvel_rivals/<id>.png

